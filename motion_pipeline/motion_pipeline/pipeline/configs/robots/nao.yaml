name: NAO
moveit_group: right_arm
base_frame: base_link
base_offset: [0.0, 0.0, 0.3]

chains:
  right:
    - RShoulderPitch
    - RShoulderRoll
    - RElbowYaw
    - RElbowRoll
    - RWristYaw

joint_groups:
  right:
    shoulder:
      pitch: RShoulderPitch
      roll: RShoulderRoll
    elbow:
      yaw: RElbowYaw
      roll: RElbowRoll
    wrist:
      yaw: RWristYaw
  left:
    shoulder:
      pitch: LShoulderPitch
      roll: LShoulderRoll
    elbow:
      yaw: LElbowYaw
      roll: LElbowRoll
    wrist:
      yaw: LWristYaw

default_orientation: [0.0, 0.0, 0.0, 1.0]

end_effectors:
  right: [base_link, r_wrist]

grippers: {}
