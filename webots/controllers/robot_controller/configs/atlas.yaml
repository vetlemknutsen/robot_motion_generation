name: Atlas

joints:
  # ARM (semantic keys used by current RML mapping)
  RShoulderRoll:
    motor: RArmShx
    sensor: null
  RShoulderYaw:
    motor: RArmUsy
    sensor: null
  RElbowPitch:
    motor: RArmEly
    sensor: null
  RElbowRoll:
    motor: RArmElx
    sensor: null
  RWristYaw:
    motor: RArmUwy
    sensor: null
  RWristRoll:
    motor: RArmMwx
    sensor: null

  # HEAD
  HeadPitch:
    motor: NeckAy
    sensor: null

# Joints locked at their initial position on startup to prevent tipping
locked_joints:
  # Back/torso
  - BackLbz
  - BackMby
  - BackUbx
  # Left arm
  - LArmUsy
  - LArmShx
  - LArmEly
  - LArmElx
  - LArmUwy
  - LArmMwx
  # Left leg
  - LLegUhz
  - LLegMhx
  - LLegLhy
  - LLegKny
  - LLegUay
  - LLegLax
  # Right leg
  - RLegUhz
  - RLegMhx
  - RLegLhy
  - RLegKny
  - RLegUay
  - RLegLax
