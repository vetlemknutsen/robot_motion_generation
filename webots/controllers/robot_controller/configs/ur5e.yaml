name: UR5e

joints:
  # ARM — keys match RML: Side[0] + Joint.capitalize() + Rotation.capitalize()
  RShoulderYaw:
    motor: shoulder_pan_joint
    sensor: shoulder_pan_joint_sensor
  RShoulderPitch:
    motor: shoulder_lift_joint
    sensor: shoulder_lift_joint_sensor
  RElbowPitch:
    motor: elbow_joint
    sensor: elbow_joint_sensor
  RWristPitch:
    motor: wrist_1_joint
    sensor: wrist_1_joint_sensor
  RWristYaw:
    motor: wrist_2_joint
    sensor: wrist_2_joint_sensor
  RWristRoll:
    motor: wrist_3_joint
    sensor: wrist_3_joint_sensor

  RGripperFinger1:
    motor: finger_1_joint_1
    sensor: finger_1_joint_1_sensor
  RGripperFinger2:
    motor: finger_2_joint_1
    sensor: finger_2_joint_1_sensor
  RGripperFinger3:
    motor: finger_middle_joint_1
    sensor: finger_middle_joint_1_sensor

  palm_finger_1_joint:
    motor: palm_finger_1_joint
    sensor: palm_finger_1_joint_sensor
  finger_1_joint_1:
    motor: finger_1_joint_1
    sensor: finger_1_joint_1_sensor
  finger_1_joint_2:
    motor: finger_1_joint_2
    sensor: finger_1_joint_2_sensor
  finger_1_joint_3:
    motor: finger_1_joint_3
    sensor: finger_1_joint_3_sensor
  palm_finger_2_joint:
    motor: palm_finger_2_joint
    sensor: palm_finger_2_joint_sensor
  finger_2_joint_1:
    motor: finger_2_joint_1
    sensor: finger_2_joint_1_sensor
  finger_2_joint_2:
    motor: finger_2_joint_2
    sensor: finger_2_joint_2_sensor
  finger_2_joint_3:
    motor: finger_2_joint_3
    sensor: finger_2_joint_3_sensor
  finger_middle_joint_1:
    motor: finger_middle_joint_1
    sensor: finger_middle_joint_1_sensor
  finger_middle_joint_2:
    motor: finger_middle_joint_2
    sensor: finger_middle_joint_2_sensor
  finger_middle_joint_3:
    motor: finger_middle_joint_3
    sensor: finger_middle_joint_3_sensor
