name: TIAGo

joints: {
  # TORSO
  RTorso_lift_joint: {
    motor: torso_lift_joint,
    sensor: torso_lift_joint_sensor
  },

  # ARM (Right)
  # Mapping generated names (RArm_X_joint) to actual motor names (arm_X_joint)
  RArm_1_joint: {
    motor: arm_1_joint,
    sensor: arm_1_joint_sensor
  },
  RArm_2_joint: {
    motor: arm_2_joint,
    sensor: arm_2_joint_sensor
  },
  RArm_3_joint: {
    motor: arm_3_joint,
    sensor: arm_3_joint_sensor
  },
  RArm_4_joint: {
    motor: arm_4_joint,
    sensor: arm_4_joint_sensor
  },
  RArm_5_joint: {
    motor: arm_5_joint,
    sensor: arm_5_joint_sensor
  },
  RArm_6_joint: {
    motor: arm_6_joint,
    sensor: arm_6_joint_sensor
  },
  RArm_7_joint: {
    motor: arm_7_joint,
    sensor: arm_7_joint_sensor
  },

  # GRIPPER (Steel parallel gripper)
  RGripper_left_finger_joint: {
    motor: gripper_left_finger_joint,
    sensor: gripper_left_finger_joint_sensor
  },
  RGripper_right_finger_joint: {
    motor: gripper_right_finger_joint,
    sensor: gripper_right_finger_joint_sensor
  },

  # HEAD (Optional mapping if needed later)
  Head_1_joint: {
    motor: head_1_joint,
    sensor: head_1_joint_sensor
  },
  Head_2_joint: {
    motor: head_2_joint,
    sensor: head_2_joint_sensor
  },

  # WHEELS (Optional)
  Wheel_left_joint: {
    motor: wheel_left_joint,
    sensor: wheel_left_joint_sensor
  },
  Wheel_right_joint: {
    motor: wheel_right_joint,
    sensor: wheel_right_joint_sensor
  }
}
